<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Lettres Précieuses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ivory:    #FAF7F0;
            --ivory-dk: #F0EAD8;
            --ink:      #2C1810;
            --ink-soft: #5C3D2E;
            --bordeaux: #8B2252;
            --gold:     #C9A96E;
            --gold-lt:  #E8D5A8;
            --rose:     #F2D7E0;
            --izan:     #C0392B;
            --thalia:   #F3A3C1;
            --paper:    #FFFDF8;
            --shadow:   rgba(44,24,16,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background-color: var(--ivory);
            color: var(--ink);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(201,169,110,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(242,215,224,0.15) 0%, transparent 60%);
        }

        #loginOverlay {
            position: fixed; inset: 0; background: var(--ivory); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box {
            background: var(--paper); border: 1px solid var(--ivory-dk); padding: 40px;
            border-radius: 4px; box-shadow: 0 10px 40px var(--shadow); text-align: center; max-width: 400px; width: 100%;
        }
        .login-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 25px; font-style: italic; color: var(--bordeaux); }
        .login-buttons { display: flex; gap: 15px; }
        .login-btn { flex: 1; padding: 15px; border: none; border-radius: 4px; font-family: 'EB Garamond', serif; font-size: 18px; color: white; cursor: pointer; transition: transform 0.2s; }
        .login-btn:active { transform: scale(0.98); }
        .btn-izan-login { background: var(--izan); }
        .btn-thalia-login { background: var(--thalia); color: #2C1810; }

        .site-header { text-align: center; padding: 40px 20px 20px; position: relative; }
        .user-status-bar { max-width: 1100px; margin: 0 auto; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .current-user-tag { font-weight: 500; padding: 4px 12px; border-radius: 20px; color: white; }
        .tag-izan { background: var(--izan); }
        .tag-thalia { background: var(--thalia); color: #2C1810; }
        .logout-link { color: var(--gold); cursor: pointer; text-decoration: underline; }

        .site-header::after { content: ''; display: block; width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 15px auto 0; }
        .site-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 5vw, 46px); font-weight: 300; color: var(--ink); line-height: 1.2; }
        .site-header h1 em { font-style: italic; color: var(--bordeaux); }

        .layout { display: grid; grid-template-columns: 1fr; gap: 32px; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }
        @media (min-width: 800px) { .layout { grid-template-columns: 420px 1fr; align-items: start; } .write-section { position: sticky; top: 24px; } }

        .write-section { background: var(--paper); border: 1px solid var(--ivory-dk); border-radius: 4px; padding: 32px 28px 28px; box-shadow: 0 8px 32px var(--shadow), 0 1px 0 var(--gold-lt) inset; position: relative; }
        .write-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(to right, var(--bordeaux), var(--gold), var(--bordeaux)); }
        .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--bordeaux); margin-bottom: 24px; font-style: italic; }

        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
        .field-group input, .field-group textarea, .field-group select { width: 100%; padding: 12px 14px; background: var(--ivory); border: 1px solid var(--ivory-dk); border-radius: 3px; font-family: 'EB Garamond', serif; font-size: 17px; color: var(--ink); outline: none; }
        .field-group textarea { height: 180px; resize: vertical; line-height: 1.7; }

        .seal-btn { width: 100%; padding: 16px; margin-top: 6px; background: var(--bordeaux); color: white; border: none; border-radius: 3px; font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; cursor: pointer; }
        .cancel-btn { width: 100%; padding: 10px; margin-top: 10px; background: transparent; border: 1px solid var(--ivory-dk); border-radius: 3px; color: var(--ink-soft); font-family: 'EB Garamond', serif; cursor: pointer; }
        
        #statusMsg { display: none; padding: 10px 14px; border-radius: 3px; font-size: 14px; margin-bottom: 14px; }
        #statusMsg.error { background: #fde8e8; color: #8B1010; border: 1px solid #f5c0c0; }
        #statusMsg.success { background: #edf7ed; color: #2d6a2d; border: 1px solid #b8ddb8; }
        #statusMsg.loading { background: var(--ivory-dk); color: var(--ink-soft); border: 1px solid var(--gold-lt); }

        #configBanner { background: #fff8e6; border: 1px solid var(--gold); border-radius: 4px; padding: 20px 24px; margin: 0 20px 28px; max-width: 1100px; display: none; }

        /* ─── INDICATEUR DE FRAPPE ─── */
        .typing-indicator {
            font-family: 'Caveat', cursive; font-size: 20px; color: var(--bordeaux);
            margin-bottom: 15px; display: none; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .history-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; border-bottom: 1px solid var(--gold-lt); padding-bottom: 12px; margin-bottom: 20px; display: flex; align-items: center; }
        .history-count { font-family: 'EB Garamond', serif; font-size: 13px; color: var(--gold); margin-left: auto; }

        .read-status-container { position: absolute; top: 14px; right: 16px; display: flex; flex-direction: column; align-items: flex-end; z-index: 5; }
        .read-status-indicator { font-size: 16px; opacity: 0.9; }
        .read-date { font-size: 11px; color: var(--ink-soft); opacity: 0.8; margin-top: 3px; font-style: italic; white-space: nowrap; }

        .letter-card { background: var(--paper); border: 1px solid var(--ivory-dk); border-radius: 4px; margin-bottom: 14px; box-shadow: 0 2px 10px var(--shadow); position: relative; }
        .letter-card-accent { height: 4px; width: 100%; }
        .accent-izan { background: linear-gradient(to right, var(--izan), #e05c4b); }
        .accent-thalia { background: linear-gradient(to right, var(--thalia), #c76e9a); }

        .letter-card-body { display: flex; align-items: center; padding: 16px 100px 16px 18px; gap: 14px; }
        .letter-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 19px; color: white; flex-shrink: 0; }
        .avatar-izan { background: var(--izan); }
        .avatar-thalia { background: var(--thalia); color: #2C1810; }

        .letter-info { flex-grow: 1; cursor: pointer; min-width: 0; }
        .letter-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 19px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .letter-meta { font-size: 13px; color: var(--ink-soft); margin-top: 2px; opacity: 0.75; }

        .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .icon-btn { width: 34px; height: 34px; border: none; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--ivory-dk); }
        .btn-del { background: #f5e8e8; }

        /* ─── BARRE DE RÉACTIONS ÉMOJIS ─── */
        .reaction-bar {
            display: flex; gap: 8px; padding: 8px 18px 12px; border-top: 1px dashed var(--ivory-dk); align-items: center;
        }
        .reaction-btn { background: none; border: 1px solid var(--ivory-dk); border-radius: 20px; font-size: 14px; padding: 4px 8px; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .reaction-btn:hover { opacity: 1; background: var(--ivory); }
        .reaction-display { font-size: 14px; margin-left: auto; display: flex; gap: 5px; }
        .reaction-badge { background: var(--rose); padding: 3px 6px; border-radius: 10px; font-size: 12px; }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-soft); opacity: 0.6; }

        /* ─── READER & MOTIFS RÉPÉTÉS ─── */
        #readerView { display: none; position: fixed; inset: 0; background: rgba(20,10,5,0.85); backdrop-filter: blur(4px); z-index: 1000; overflow-y: auto; padding: 30px 0 60px; }
        .reader-topbar { max-width: 740px; margin: 0 auto 18px; padding: 0 16px; display: flex; justify-content: space-between; gap: 10px; }
        .reader-btn { background: rgba(255,255,255,0.9); border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }
        .a4-sheet { background: var(--paper); width: calc(100% - 32px); max-width: 700px; min-height: 500px; margin: 0 auto; padding: clamp(40px, 8vw, 80px) clamp(30px, 7vw, 70px); position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* C'est ici que la magie des motifs répétés opère ! */
        .pattern-hearts { background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='20' opacity='0.03'%3E❤️%3C/text%3E%3C/svg%3E"); }
        .pattern-flowers { background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='20' opacity='0.04'%3E🌸%3C/text%3E%3C/svg%3E"); }
        .pattern-stars { background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='20' opacity='0.04'%3E✨%3C/text%3E%3C/svg%3E"); }
        .pattern-vintage { background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='20' opacity='0.03'%3E📜%3C/text%3E%3C/svg%3E"); }

        .sheet-meta { font-family: 'EB Garamond', serif; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--ivory-dk); padding-bottom: 14px; margin-bottom: 28px; position: relative; z-index: 2; }
        .sheet-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 5vw, 42px); font-style: italic; color: var(--bordeaux); text-align: center; margin-bottom: 32px; position: relative; z-index: 2;}
        .sheet-content { font-family: 'Caveat', cursive; font-size: clamp(20px, 4vw, 27px); line-height: 1.75; white-space: pre-wrap; position: relative; z-index: 2;}
        .sheet-footer { margin-top: 48px; text-align: right; font-family: 'Caveat', cursive; font-size: 22px; font-style: italic; position: relative; z-index: 2;}
    </style>
</head>
<body>

<div id="loginOverlay" style="display: none;">
    <div class="login-box">
        <h2>Qui êtes-vous ?</h2>
        <div class="login-buttons">
            <button class="login-btn btn-izan-login" onclick="loginAs('Izan')">Izan 💌</button>
            <button class="login-btn btn-thalia-login" onclick="loginAs('Thalia')">Thalia 🌸</button>
        </div>
    </div>
</div>

<div class="user-status-bar">
    <div>Connecté en tant que : <span id="currentUserTag" class="current-user-tag">...</span></div>
    <div class="logout-link" onclick="logout()">Changer de compte</div>
</div>

<header class="site-header">
    <h1>Lettres pour quand on ne<br>peut pas <em>se voir</em></h1>
</header>

<div class="layout">
    <section class="write-section">
        <h2 class="panel-title" id="formTitle">✦ Partage tes sentiments ✦</h2>
        <div id="statusMsg"></div>
        <div class="field-group"><label>Titre de ton trésor</label><input type="text" id="title" placeholder="Un doux titre…"></div>
        <div class="field-group"><label>Ta lettre</label><textarea id="content" placeholder="Laisse ton cœur parler…"></textarea></div>
        <div class="field-group">
            <label>Motif décoratif</label>
            <select id="motif">
                <option value="none">Aucun motif</option>
                <option value="hearts">❤️ Cœurs</option>
                <option value="flowers">🌸 Fleurs</option>
                <option value="stars">✨ Étoiles</option>
                <option value="vintage">📜 Style Ancien</option>
            </select>
        </div>
        <button class="seal-btn" id="submitBtn" onclick="saveLetter()">Sceller &amp; envoyer la lettre</button>
        <button class="cancel-btn" id="cancelEditBtn" onclick="resetForm()" style="display:none;">Annuler</button>
    </section>

    <section class="history-section">
        <div id="typingIndicator" class="typing-indicator">Quelqu'un est en train d'écrire... ✍️</div>
        
        <h2 class="history-title">📜 Notre petite poste <span class="history-count" id="letterCount"></span></h2>
        <div id="lettersList"><div class="empty-state">Chargement…</div></div>
    </section>
</div>

<div id="readerView">
    <div class="reader-topbar">
        <button class="reader-btn" onclick="closeLetter()">⬅️ Retour</button>
    </div>
    <div class="a4-sheet" id="fullSheet">
        <div class="sheet-meta" id="sheetMeta"></div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-content" id="sheetContent"></div>
        <div class="sheet-footer" id="sheetFooter"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const FIREBASE_CONFIG = {
        apiKey:            "AIzaSyDe3z2Al2lFQjTXpjvNGjKZdb68sc1DJl4",
        authDomain:        "e-lettres.firebaseapp.com",
        projectId:         "e-lettres",
        storageBucket:     "e-lettres.appspot.com",
        messagingSenderId: "1054625595553",
        appId:             "1:1054625595553:web:eeed9b8c62d96259acf0e0"
    };

    const FIREBASE_READY = true;
    let db, lettersCol, statusDoc;
    let usingLocal = false;
    let currentUser = localStorage.getItem('letter_user') || null;
    let isInitialLoad = true; // Pour ne pas spammer les notifications au chargement

    if (FIREBASE_READY) {
        try {
            const app = initializeApp(FIREBASE_CONFIG);
            db = getFirestore(app);
            lettersCol = collection(db, "letters");
            statusDoc = doc(db, "status", "typing");
        } catch(e) { usingLocal = true; }
    }

    // ── GESTION NOTIFICATIONS WEB ──
    function requestNotifications() {
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    function sendNotification(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body: body, icon: "💌" });
        }
    }

    window.checkUser = function() {
        if (!currentUser) {
            document.getElementById('loginOverlay').style.display = 'flex';
        } else {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('currentUserTag').textContent = currentUser;
            document.getElementById('currentUserTag').className = 'current-user-tag ' + (currentUser === 'Izan' ? 'tag-izan' : 'tag-thalia');
            requestNotifications();
        }
    };

    window.loginAs = function(user) {
        localStorage.setItem('letter_user', user);
        currentUser = user;
        window.checkUser();
        initFirebaseListener();
    };

    window.logout = function() {
        localStorage.removeItem('letter_user'); currentUser = null; window.checkUser();
    };

    function formatDate(ts) {
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    let editingId = null, activeLetter = null, allLetters = [];

    // ── INDICATEUR DE FRAPPE (TYPING) ──
    let typingTimeout;
    const inputFields = [document.getElementById('title'), document.getElementById('content')];
    inputFields.forEach(el => {
        el.addEventListener('input', () => {
            if (!usingLocal && currentUser) {
                setDoc(statusDoc, { [currentUser]: Date.now() }, { merge: true });
                clearTimeout(typingTimeout);
                // Arrête d'indiquer la frappe après 3 secondes d'inactivité
                typingTimeout = setTimeout(() => {
                    setDoc(statusDoc, { [currentUser]: 0 }, { merge: true });
                }, 3000);
            }
        });
    });

    if (!usingLocal) {
        onSnapshot(statusDoc, (snap) => {
            const data = snap.data();
            const otherUser = currentUser === "Izan" ? "Thalia" : "Izan";
            const indicator = document.getElementById('typingIndicator');
            // Si l'autre a tapé il y a moins de 5 secondes
            if (data && data[otherUser] && (Date.now() - data[otherUser] < 5000)) {
                indicator.innerText = `${otherUser} est en train d'écrire... ✍️`;
                indicator.style.display = 'block';
            } else {
                indicator.style.display = 'none';
            }
        });
    }

    // ── RÉACTIONS ÉMOJIS ──
    window.addReaction = async function(letterId, emoji) {
        if(usingLocal) return;
        const l = allLetters.find(x => x.id === letterId);
        if(!l) return;
        
        let currentReactions = l.reactions || {};
        currentReactions[currentUser] = emoji; // Remplace l'ancienne réaction par la nouvelle

        try {
            await updateDoc(doc(db, "letters", letterId), { reactions: currentReactions });
        } catch(e) { console.error("Erreur réaction", e); }
    };

    function renderLetters(letters) {
        allLetters = letters;
        const list = document.getElementById('lettersList');
        document.getElementById('letterCount').textContent = letters.length ? `${letters.length} lettre${letters.length > 1 ? 's' : ''}` : '';

        if (!letters.length) {
            list.innerHTML = `<div class="empty-state">Aucune lettre pour le moment…</div>`;
            return;
        }

        list.innerHTML = '';
        letters.forEach(l => {
            const isIzan = l.author === "Izan";
            const initiale = l.author ? l.author[0] : '?';
            const dateStr = l.createdAt ? formatDate(l.createdAt) : '';
            const isAuthor = currentUser === l.author;

            const readBy = l.readBy || [];
            const recipient = l.author === "Izan" ? "Thalia" : "Izan";
            const isReadByRecipient = readBy.includes(recipient);
            const statusIcon = isReadByRecipient ? "❤️" : "♡";
            let readDateHtml = (isReadByRecipient && l.readAt) ? `<div class="read-date">Lu le ${formatDate(l.readAt)}</div>` : "";

            // Génération de l'affichage des réactions
            const reactions = l.reactions || {};
            let reactionsHtml = "";
            for (const [user, emoji] of Object.entries(reactions)) {
                reactionsHtml += `<span class="reaction-badge" title="${user} a réagi avec ${emoji}">${emoji}</span>`;
            }

            const card = document.createElement('div');
            card.className = 'letter-card';
            card.innerHTML = `
                <div class="letter-card-accent ${isIzan ? 'accent-izan' : 'accent-thalia'}"></div>
                <div class="read-status-container"><div class="read-status-indicator">${statusIcon}</div>${readDateHtml}</div>
                <div class="letter-card-body">
                    <div class="letter-avatar ${isIzan ? 'avatar-izan' : 'avatar-thalia'}">${initiale}</div>
                    <div class="letter-info" onclick="window._openLetter('${l.id}')">
                        <h3>${escHtml(l.title)}</h3>
                        <p class="letter-meta">De ${escHtml(l.author)} · ${dateStr}</p>
                    </div>
                    <div class="card-actions" style="display: ${isAuthor ? 'flex' : 'none'};">
                        <button class="icon-btn btn-edit" title="Modifier" onclick="window._startEdit('${l.id}', event)">✏️</button>
                        <button class="icon-btn btn-del" title="Supprimer" onclick="window._deleteLetter('${l.id}', event)">🗑️</button>
                    </div>
                </div>
                <div class="reaction-bar">
                    <span style="font-size: 12px; color: var(--ink-soft);">Réagir : </span>
                    <button class="reaction-btn" onclick="addReaction('${l.id}', '❤️')">❤️</button>
                    <button class="reaction-btn" onclick="addReaction('${l.id}', '🥺')">🥺</button>
                    <button class="reaction-btn" onclick="addReaction('${l.id}', '😂')">😂</button>
                    <button class="reaction-btn" onclick="addReaction('${l.id}', '✨')">✨</button>
                    <div class="reaction-display">${reactionsHtml}</div>
                </div>`;
            list.appendChild(card);
        });
    }

    function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    window.saveLetter = async function() {
        const title = document.getElementById('title').value.trim();
        const text = document.getElementById('content').value.trim();
        const motif = document.getElementById('motif').value;
        if (!title || !text) return;

        document.getElementById('submitBtn').disabled = true;
        try {
            if (editingId) {
                await updateDoc(doc(db, "letters", editingId), { title, text, motif, editedAt: serverTimestamp() });
            } else {
                await addDoc(lettersCol, { title, text, motif, author: currentUser, createdAt: serverTimestamp(), readBy: [], readAt: null, reactions: {} });
            }
            resetForm();
        } catch(e) {} finally { document.getElementById('submitBtn').disabled = false; }
    };

    window._startEdit = function(id, event) {
        event.stopPropagation(); const l = allLetters.find(x => x.id === id); if (!l || l.author !== currentUser) return; 
        editingId = l.id; document.getElementById('title').value = l.title; document.getElementById('content').value = l.text;
        document.getElementById('motif').value = l.motif || 'none'; document.getElementById('cancelEditBtn').style.display = 'block'; window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.resetForm = function() { editingId = null; document.getElementById('title').value = ''; document.getElementById('content').value = ''; document.getElementById('motif').value = 'none'; document.getElementById('cancelEditBtn').style.display = 'none'; };

    window._deleteLetter = async function(id, event) {
        event.stopPropagation(); const l = allLetters.find(x => x.id === id); if (!l || l.author !== currentUser) return; 
        if (confirm('Effacer définitivement ?')) { await deleteDoc(doc(db, "letters", id)); if (editingId === id) resetForm(); }
    };

    window._openLetter = async function(id) {
        activeLetter = allLetters.find(x => x.id === id);
        if (!activeLetter) return;

        const readBy = activeLetter.readBy || [];
        if (activeLetter.author !== currentUser && !readBy.includes(currentUser)) {
            readBy.push(currentUser);
            try { await updateDoc(doc(db, "letters", id), { readBy: readBy, readAt: serverTimestamp() }); } catch(e) {}
        }

        const sheet = document.getElementById('fullSheet');
        // Application du motif de fond CSS
        sheet.className = "a4-sheet pattern-" + (activeLetter.motif || 'none');

        document.getElementById('sheetMeta').textContent = `Écrit par ${activeLetter.author} · ${formatDate(activeLetter.createdAt)}`;
        document.getElementById('sheetTitle').textContent = activeLetter.title;
        document.getElementById('sheetContent').textContent = activeLetter.text;
        document.getElementById('sheetFooter').textContent = `— ${activeLetter.author} ✦`;
        document.getElementById('readerView').style.display = 'block'; document.body.style.overflow = 'hidden';
    };

    window.closeLetter = function() { document.getElementById('readerView').style.display = 'none'; document.body.style.overflow = ''; };

    function initFirebaseListener() {
        onSnapshot(query(lettersCol, orderBy("createdAt", "desc")), snap => {
            const letters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Système de notification (Si ce n'est pas le premier chargement et qu'il y a une nouvelle lettre)
            if (!isInitialLoad && letters.length > allLetters.length) {
                const newestLetter = letters[0];
                if (newestLetter.author !== currentUser) {
                    sendNotification(`💌 Nouveau mot de ${newestLetter.author}`, newestLetter.title);
                }
            }
            isInitialLoad = false;
            renderLetters(letters);
        });
    }

    window.checkUser();
    if (currentUser) { initFirebaseListener(); }
</script>
</body>
</html>
