<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Lettres Précieuses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ivory:    #FAF7F0;
            --ivory-dk: #F0EAD8;
            --ink:      #2C1810;
            --ink-soft: #5C3D2E;
            --bordeaux: #8B2252;
            --gold:     #C9A96E;
            --gold-lt:  #E8D5A8;
            --rose:     #F2D7E0;
            --izan:     #C0392B;
            --thalia:   #F3A3C1;
            --paper:    #FFFDF8;
            --shadow:   rgba(44,24,16,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background-color: var(--ivory);
            color: var(--ink);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(201,169,110,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(242,215,224,0.15) 0%, transparent 60%);
        }

        #loginOverlay {
            position: fixed;
            inset: 0;
            background: var(--ivory);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: var(--paper);
            border: 1px solid var(--ivory-dk);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 40px var(--shadow);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .login-box h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            margin-bottom: 25px;
            font-style: italic;
            color: var(--bordeaux);
        }
        .login-buttons {
            display: flex;
            gap: 15px;
        }
        .login-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-family: 'EB Garamond', serif;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:active { transform: scale(0.98); }
        .btn-izan-login { background: var(--izan); }
        .btn-thalia-login { background: var(--thalia); }

        .site-header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }
        .user-status-bar {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .current-user-tag {
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
        }
        .tag-izan { background: var(--izan); }
        .tag-thalia { background: var(--thalia); }
        .logout-link {
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
        }

        .site-header::after {
            content: '';
            display: block;
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 15px auto 0;
        }
        .header-eyebrow {
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .site-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(28px, 5vw, 46px);
            font-weight: 300;
            color: var(--ink);
            line-height: 1.2;
        }
        .site-header h1 em {
            font-style: italic;
            color: var(--bordeaux);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        @media (min-width: 800px) {
            .layout { grid-template-columns: 420px 1fr; align-items: start; }
            .write-section { position: sticky; top: 24px; }
        }

        .write-section {
            background: var(--paper);
            border: 1px solid var(--ivory-dk);
            border-radius: 4px;
            padding: 32px 28px 28px;
            box-shadow: 0 8px 32px var(--shadow), 0 1px 0 var(--gold-lt) inset;
            position: relative;
            overflow: hidden;
        }
        .write-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(to right, var(--bordeaux), var(--gold), var(--bordeaux));
        }
        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--bordeaux);
            margin-bottom: 24px;
            font-style: italic;
        }

        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
            font-family: 'EB Garamond', serif;
        }
        .field-group input,
        .field-group textarea,
        .field-group select {
            width: 100%;
            padding: 12px 14px;
            background: var(--ivory);
            border: 1px solid var(--ivory-dk);
            border-radius: 3px;
            font-family: 'EB Garamond', serif;
            font-size: 17px;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-group input:focus,
        .field-group textarea:focus,
        .field-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
        }
        .field-group textarea { height: 180px; resize: vertical; line-height: 1.7; }
        .field-group select { cursor: pointer; }

        .seal-btn {
            width: 100%;
            padding: 16px;
            margin-top: 6px;
            background: var(--bordeaux);
            color: white;
            border: none;
            border-radius: 3px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-style: italic;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.25s, transform 0.1s;
            letter-spacing: 0.02em;
        }
        .seal-btn:hover { background: #6e1a40; }
        .seal-btn:active { transform: scale(0.99); }
        .seal-btn.sending::after {
            content: '🕯️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 32px;
            animation: wax-seal 0.6s forwards;
        }
        @keyframes wax-seal {
            0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
            60%  { transform: translate(-50%,-50%) scale(1.4); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1.1); opacity: 0; }
        }

        .cancel-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--ivory-dk);
            border-radius: 3px;
            color: var(--ink-soft);
            font-family: 'EB Garamond', serif;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cancel-btn:hover { background: var(--ivory-dk); }

        #statusMsg {
            display: none;
            padding: 10px 14px;
            border-radius: 3px;
            font-size: 14px;
            margin-bottom: 14px;
            font-family: 'EB Garamond', serif;
        }
        #statusMsg.error   { background: #fde8e8; color: #8B1010; border: 1px solid #f5c0c0; }
        #statusMsg.success { background: #edf7ed; color: #2d6a2d; border: 1px solid #b8ddb8; }
        #statusMsg.loading { background: var(--ivory-dk); color: var(--ink-soft); border: 1px solid var(--gold-lt); }

        #configBanner {
            background: #fff8e6;
            border: 1px solid var(--gold);
            border-radius: 4px;
            padding: 20px 24px;
            margin: 0 auto 28px;
            max-width: 1100px;
            margin-left: 20px;
            margin-right: 20px;
            font-size: 15px;
            line-height: 1.7;
            display: none;
        }
        #configBanner strong { color: var(--bordeaux); font-family: 'Cormorant Garamond', serif; font-size: 18px; }

        .history-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 300;
            color: var(--ink);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gold-lt);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-count {
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-left: auto;
        }

        /* ─── ICÔNE DE LECTURE (ANGLE DROIT DU BOUTON CLICKABLE) ─── */
        .read-status-indicator {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 15px;
            opacity: 0.8;
            z-index: 5;
            user-select: none;
        }

        .letter-card {
            background: var(--paper);
            border: 1px solid var(--ivory-dk);
            border-radius: 4px;
            padding: 0;
            margin-bottom: 14px;
            box-shadow: 0 2px 10px var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .letter-card:hover { box-shadow: 0 6px 20px var(--shadow); transform: translateY(-2px); }
        .letter-card-accent { height: 4px; width: 100%; }
        .accent-izan   { background: linear-gradient(to right, var(--izan), #e05c4b); }
        .accent-thalia { background: linear-gradient(to right, var(--thalia), #c76e9a); }

        .letter-card-body {
            display: flex;
            align-items: center;
            padding: 16px 18px;
            gap: 14px;
        }
        .letter-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            font-style: italic;
            color: white;
            flex-shrink: 0;
        }
        .avatar-izan   { background: var(--izan); }
        .avatar-thalia { background: var(--thalia); }

        .letter-info { flex-grow: 1; cursor: pointer; min-width: 0; }
        .letter-info h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            font-weight: 400;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 24px; /* Évite la superposition avec le cœur */
        }
        .letter-meta {
            font-size: 13px;
            color: var(--ink-soft);
            margin-top: 2px;
            opacity: 0.75;
        }
        .modified-tag { font-style: italic; color: var(--gold); font-size: 12px; }

        .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .icon-btn {
            padding: 7px 13px;
            border: none;
            border-radius: 3px;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.15s;
            width: auto;
        }
        .icon-btn:hover { opacity: 0.8; }
        .btn-edit { background: var(--ivory-dk); color: var(--ink); }
        .btn-del  { background: #f5e8e8; color: #8B2020; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--ink-soft);
            opacity: 0.6;
        }
        .empty-state .empty-icon { font-size: 42px; margin-bottom: 14px; }
        .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; }

        #readerView {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20,10,5,0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            overflow-y: auto;
            padding: 30px 0 60px;
        }
        .reader-topbar {
            max-width: 740px;
            margin: 0 auto 18px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .reader-btn {
            background: rgba(255,255,255,0.9);
            color: var(--ink);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'EB Garamond', serif;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            width: auto;
        }
        .reader-btn:hover { background: white; }
        .reader-btn.download { background: var(--bordeaux); color: white; }
        .reader-btn.download:hover { background: #6e1a40; }

        .a4-sheet {
            background: var(--paper);
            width: calc(100% - 32px);
            max-width: 700px;
            min-height: 500px;
            margin: 0 auto;
            padding: clamp(40px, 8vw, 80px) clamp(30px, 7vw, 70px);
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
        }
        .sheet-watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(80px, 18vw, 140px);
            opacity: 0.035;
            pointer-events: none;
            user-select: none;
        }
        .sheet-top-motif {
            text-align: center;
            font-size: clamp(20px, 4vw, 28px);
            letter-spacing: 0.4em;
            opacity: 0.25;
            margin-bottom: 28px;
        }
        .sheet-meta {
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            border-bottom: 1px solid var(--ivory-dk);
            padding-bottom: 14px;
            margin-bottom: 28px;
        }
        .sheet-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(26px, 5vw, 42px);
            font-weight: 300;
            font-style: italic;
            color: var(--bordeaux);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.2;
        }
        .sheet-content {
            font-family: 'Caveat', cursive;
            font-size: clamp(20px, 4vw, 27px);
            line-height: 1.75;
            color: var(--ink);
            white-space: pre-wrap;
        }
        .sheet-footer {
            margin-top: 48px;
            text-align: right;
            font-family: 'Caveat', cursive;
            font-size: clamp(18px, 3vw, 22px);
            color: var(--ink-soft);
            font-style: italic;
        }

        .motif-line { text-align: center; margin: 32px 0; font-size: 18px; letter-spacing: 0.5em; opacity: 0.22; }
        .loader { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 20px; }
    </style>
</head>
<body>

<div id="loginOverlay" style="display: none;">
    <div class="login-box">
        <h2>Qui êtes-vous ?</h2>
        <div class="login-buttons">
            <button class="login-btn btn-izan-login" onclick="loginAs('Izan')">Izan 💌</button>
            <button class="login-btn btn-thalia-login" onclick="loginAs('Thalia')">Thalia 🌸</button>
        </div>
    </div>
</div>

<div id="configBanner">
    <strong>⚙️ Configuration Firebase requise</strong><br>Mode local activé.
</div>

<div class="user-status-bar">
    <div>Connecté en tant que : <span id="currentUserTag" class="current-user-tag">...</span></div>
    <div class="logout-link" onclick="logout()">Changer de compte</div>
</div>

<header class="site-header">
    <p class="header-eyebrow"></p>
    <h1>Lettres pour quand on ne<br>peut pas <em>se voir</em></h1>
</header>

<div class="layout">

    <section class="write-section">
        <h2 class="panel-title" id="formTitle">✦ Partage tes sentiments ✦</h2>
        <div id="statusMsg"></div>

        <div class="field-group">
            <label>Titre de ton trésor</label>
            <input type="text" id="title" placeholder="Un doux titre…">
        </div>

        <div class="field-group">
            <label>Ta lettre</label>
            <textarea id="content" placeholder="Laisse ton cœur parler…"></textarea>
        </div>

        <div class="field-group">
            <label>Motif décoratif</label>
            <select id="motif">
                <option value="none">Aucun motif</option>
                <option value="hearts">❤️ Cœurs</option>
                <option value="flowers">🌸 Fleurs</option>
                <option value="stars">✨ Étoiles</option>
                <option value="vintage">📜 Style Ancien</option>
            </select>
        </div>

        <button class="seal-btn" id="submitBtn" onclick="saveLetter()">Sceller &amp; envoyer la lettre</button>
        <button class="cancel-btn" id="cancelEditBtn" onclick="resetForm()" style="display:none;">Annuler la modification</button>
    </section>

    <section class="history-section">
        <h2 class="history-title">
            📜 Notre petite poste
            <span class="history-count" id="letterCount"></span>
        </h2>
        <div id="lettersList"><div class="loader">Chargement…</div></div>
    </section>

</div>

<div id="readerView">
    <div class="reader-topbar">
        <button class="reader-btn" onclick="closeLetter()">⬅️ Retour</button>
        <button class="reader-btn download" id="downloadBtn">💾 Télécharger</button>
    </div>
    <div class="a4-sheet" id="fullSheet">
        <div class="sheet-watermark" id="sheetWatermark"></div>
        <div class="sheet-top-motif" id="sheetTopMotif"></div>
        <div class="sheet-meta" id="sheetMeta"></div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="motif-line" id="motifLine"></div>
        <div class="sheet-content" id="sheetContent"></div>
        <div class="sheet-footer" id="sheetFooter"></div>
    </div>
</div>

<script type="module">
    import { initializeApp }         from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const FIREBASE_CONFIG = {
        apiKey:            "AIzaSyDe3z2Al2lFQjTXpjvNGjKZdb68sc1DJl4",
        authDomain:        "e-lettres.firebaseapp.com",
        projectId:         "e-lettres",
        storageBucket:     "e-lettres.appspot.com",
        messagingSenderId: "1054625595553",
        appId:             "1:1054625595553:web:eeed9b8c62d96259acf0e0"
    };

    const FIREBASE_READY = !FIREBASE_CONFIG.apiKey.startsWith("VOTRE_");
    let db, lettersCol;
    let usingLocal = !FIREBASE_READY;
    let currentUser = localStorage.getItem('letter_user') || null;

    if (FIREBASE_READY) {
        try {
            const app = initializeApp(FIREBASE_CONFIG);
            db = getFirestore(app);
            lettersCol = collection(db, "letters");
        } catch(e) { usingLocal = true; }
    }

    window.checkUser = function() {
        if (!currentUser) {
            document.getElementById('loginOverlay').style.display = 'flex';
        } else {
            document.getElementById('loginOverlay').style.display = 'none';
            const tag = document.getElementById('currentUserTag');
            tag.textContent = currentUser;
            tag.className = 'current-user-tag ' + (currentUser === 'Izan' ? 'tag-izan' : 'tag-thalia');
        }
    };

    window.loginAs = function(user) {
        localStorage.setItem('letter_user', user);
        currentUser = user;
        window.checkUser();
        if (usingLocal) { renderLetters(localGetAll()); } else { initFirebaseListener(); }
    };

    window.logout = function() {
        localStorage.removeItem('letter_user');
        currentUser = null;
        window.checkUser();
    };

    const MOTIF_ICONS = {
        hearts:  { top: "❤️ ♡ ❤️ ♡ ❤️", wm: "❤", line: "— ❤ ——— ❤ ——— ❤ —" },
        flowers: { top: "🌸 ✿ 🌼 ✿ 🌸", wm: "🌸", line: "— 🌸 ——— 🌼 ——— 🌸 —" },
        stars:   { top: "✦ ✧ ✨ ✧ ✦", wm: "✨", line: "— ✦ ——— ✧ ——— ✦ —" },
        vintage: { top: "✉ ◆ 🖋 ◆ ✉", wm: "✉", line: "— ✉ ——— ✒ ——— ✉ —" },
        none:    { top: "", wm: "✦", line: "— ✦ —————————— ✦ —" }
    };

    function formatDate(ts) {
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function showStatus(msg, type = 'loading') {
        const el = document.getElementById('statusMsg'); el.textContent = msg; el.className = type; el.style.display = 'block';
    }
    function hideStatus() { document.getElementById('statusMsg').style.display = 'none'; }

    function localGetAll() { return JSON.parse(localStorage.getItem('myLetters') || '[]'); }
    function localSetAll(letters) { localStorage.setItem('myLetters', JSON.stringify(letters)); }

    let editingId  = null;
    let activeLetter = null;
    let allLetters = [];

    function renderLetters(letters) {
        allLetters = letters;
        const list = document.getElementById('lettersList');
        const count = document.getElementById('letterCount');
        count.textContent = letters.length ? `${letters.length} lettre${letters.length > 1 ? 's' : ''}` : '';

        if (!letters.length) {
            list.innerHTML = `<div class="empty-state"><div class="empty-icon">✉️</div><p>Aucune lettre pour le moment…</p></div>`;
            return;
        }

        list.innerHTML = '';
        letters.forEach(l => {
            const isIzan   = l.author === "Izan";
            const initiale = l.author ? l.author[0] : '?';
            const dateStr  = l.createdAt ? formatDate(l.createdAt) : (l.date || '');
            const editStr  = l.editedAt  ? formatDate(l.editedAt)  : (l.editDate || '');

            const isAuthor = currentUser === l.author;

            // Calcul de l'état de lecture : cœur rempli si lu par l'utilisateur connecté, sinon cœur vide
            const readBy = l.readBy || [];
            const isRead = readBy.includes(currentUser);
            const statusIcon = isRead ? "❤️" : "♡";
            const statusTitle = isRead ? "Lettre lue" : "Nouvelle lettre non lue !";

            const card = document.createElement('div');
            card.className = 'letter-card';
            card.style.position = 'relative'; 
            card.innerHTML = `
                <div class="letter-card-accent ${isIzan ? 'accent-izan' : 'accent-thalia'}"></div>
                <div class="read-status-indicator" title="${statusTitle}">${statusIcon}</div>
                <div class="letter-card-body">
                    <div class="letter-avatar ${isIzan ? 'avatar-izan' : 'avatar-thalia'}">${initiale}</div>
                    <div class="letter-info" onclick="window._openLetter('${l.id}')">
                        <h3>${escHtml(l.title)}</h3>
                        <p class="letter-meta">
                            De ${escHtml(l.author)} · ${dateStr}
                            ${editStr ? `<span class="modified-tag"> · modifié le ${editStr}</span>` : ''}
                        </p>
                    </div>
                    <div class="card-actions" style="display: ${isAuthor ? 'flex' : 'none'};">
                        <button class="icon-btn btn-edit" onclick="window._startEdit('${l.id}', event)">Modifier</button>
                        <button class="icon-btn btn-del"  onclick="window._deleteLetter('${l.id}', event)">Supprimer</button>
                    </div>
                </div>`;
            list.appendChild(card);
        });
    }

    function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    window.saveLetter = async function() {
        const title  = document.getElementById('title').value.trim();
        const text   = document.getElementById('content').value.trim();
        const motif  = document.getElementById('motif').value;
        const author = currentUser;

        if (!title || !text) { showStatus("N'oublie pas le titre et le contenu !", 'error'); return; }

        const btn = document.getElementById('submitBtn');
        btn.classList.add('sending'); btn.disabled = true;
        showStatus('Envoi en cours…', 'loading');

        try {
            if (usingLocal) {
                const letters = localGetAll();
                if (editingId) {
                    const idx = letters.findIndex(l => l.id === editingId);
                    if (idx > -1 && letters[idx].author === currentUser) { 
                        letters[idx] = { ...letters[idx], title, text, motif, editDate: new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'}) };
                    }
                } else {
                    const dateStr = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'});
                    letters.unshift({ id: String(Date.now()), title, text, motif, author, date: dateStr, editDate: '', readBy: [currentUser] });
                }
                localSetAll(letters); renderLetters(localGetAll());
            } else {
                if (editingId) {
                    await updateDoc(doc(db, "letters", editingId), { title, text, motif, editedAt: serverTimestamp() });
                } else {
                    await addDoc(lettersCol, { title, text, motif, author, createdAt: serverTimestamp(), readBy: [currentUser] });
                }
            }
            showStatus('Lettre envoyée ! 💌', 'success');
            setTimeout(hideStatus, 2500);
            resetForm();
        } catch(e) { showStatus('Erreur lors de l\'envoi.', 'error'); }
        finally { btn.classList.remove('sending'); btn.disabled = false; }
    };

    window._startEdit = function(id, event) {
        event.stopPropagation();
        const l = allLetters.find(x => x.id === id);
        if (!l || l.author !== currentUser) return; 
        editingId = l.id;
        document.getElementById('title').value   = l.title;
        document.getElementById('content').value = l.text;
        document.getElementById('motif').value   = l.motif || 'none';
        document.getElementById('formTitle').textContent     = '📝 Modifier votre lettre';
        document.getElementById('submitBtn').textContent     = 'Enregistrer les modifications';
        document.getElementById('cancelEditBtn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.resetForm = function() {
        editingId = null;
        document.getElementById('title').value     = '';
        document.getElementById('content').value   = '';
        document.getElementById('motif').value     = 'none';
        document.getElementById('formTitle').textContent       = '✦ Rédiger un mot doux';
        document.getElementById('submitBtn').textContent       = 'Sceller & envoyer la lettre';
        document.getElementById('cancelEditBtn').style.display = 'none';
        hideStatus();
    };

    window._deleteLetter = async function(id, event) {
        event.stopPropagation();
        const l = allLetters.find(x => x.id === id);
        if (!l || l.author !== currentUser) return; 
        if (!confirm('Veux-tu vraiment effacer définitivement cette lettre ?')) return;
        try {
            if (usingLocal) {
                localSetAll(localGetAll().filter(l => l.id !== id));
                renderLetters(localGetAll());
            } else {
                await deleteDoc(doc(db, "letters", id));
            }
            if (editingId === id) resetForm();
        } catch(e) { showStatus('Erreur lors de la suppression.', 'error'); }
    };

    window._openLetter = async function(id) {
        activeLetter = allLetters.find(x => x.id === id);
        if (!activeLetter) return;

        // Si la personne qui ouvre la lettre n'est pas encore marquée dans la liste des lecteurs
        const readBy = activeLetter.readBy || [];
        if (!readBy.includes(currentUser)) {
            readBy.push(currentUser);
            if (!usingLocal) {
                try {
                    await updateDoc(doc(db, "letters", id), { readBy: readBy });
                } catch(e) { console.error("Erreur marquage lecture:", e); }
            } else {
                const letters = localGetAll();
                const idx = letters.findIndex(x => x.id === id);
                if (idx > -1) {
                    letters[idx].readBy = readBy;
                    localSetAll(letters);
                    renderLetters(localGetAll());
                }
            }
        }

        const motif = activeLetter.motif || 'none';
        const icons = MOTIF_ICONS[motif] || MOTIF_ICONS.none;

        document.getElementById('sheetWatermark').textContent = icons.wm;
        document.getElementById('sheetTopMotif').textContent  = icons.top;
        document.getElementById('motifLine').textContent      = icons.line;

        const dateStr  = activeLetter.createdAt ? formatDate(activeLetter.createdAt) : (activeLetter.date || '');
        const editStr  = activeLetter.editedAt  ? formatDate(activeLetter.editedAt)  : (activeLetter.editDate || '');
        let metaTxt = `Écrit par ${activeLetter.author} · ${dateStr}`;
        if (editStr) metaTxt += ` · Modifié le ${editStr}`;

        document.getElementById('sheetMeta').textContent    = metaTxt;
        document.getElementById('sheetTitle').textContent   = activeLetter.title;
        document.getElementById('sheetContent').textContent = activeLetter.text;
        document.getElementById('sheetFooter').textContent  = `— ${activeLetter.author} ✦`;

        document.getElementById('readerView').style.display = 'block';
        document.body.style.overflow = 'hidden';
    };

    window.closeLetter = function() {
        document.getElementById('readerView').style.display = 'none'; document.body.style.overflow = '';
    };

    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!activeLetter) return;
        const dateStr = activeLetter.createdAt ? formatDate(activeLetter.createdAt) : (activeLetter.date || '');
        let txt = `=== ${activeLetter.title.toUpperCase()} ===\n\nDe : ${activeLetter.author}\nDate : ${dateStr}\n\n${activeLetter.text}`;
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' })),
            download: `${activeLetter.title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.txt`
        });
        a.click();
    });

    document.getElementById('readerView').addEventListener('click', e => {
        if (e.target === document.getElementById('readerView')) closeLetter();
    });

    function initFirebaseListener() {
        const q = query(lettersCol, orderBy("createdAt", "desc"));
        onSnapshot(q, snap => {
            const letters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLetters(letters);
        });
    }

    window.checkUser();
    if (currentUser) {
        if (usingLocal) { renderLetters(localGetAll()); } else { initFirebaseListener(); }
    }
</script>
</body>
</html>
